apiVersion: v1
kind: Service
metadata:
  name: mental-health-service
  namespace: mental-health
spec:
  selector:
    app: mental-health-app
  ports:
  - name: api
    port: 8000
    targetPort: 8000
    protocol: TCP
  - name: educator
    port: 3838
    targetPort: 3838
    protocol: TCP
  - name: counselor
    port: 3839
    targetPort: 3839
    protocol: TCP
  - name: admin
    port: 3840
    targetPort: 3840
    protocol: TCP
  type: LoadBalancer