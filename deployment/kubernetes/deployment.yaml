apiVersion: apps/v1
kind: Deployment
metadata:
  name: mental-health-app
  namespace: mental-health
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mental-health-app
  template:
    metadata:
      labels:
        app: mental-health-app
    spec:
      containers:
      - name: r-app
        image: mental-health-app:latest
        ports:
        - containerPort: 8000
        - containerPort: 3838
        - containerPort: 3839
        - containerPort: 3840
        env:
        - name: R_HOME
          value: "/usr/lib/R"
        volumeMounts:
        - name: logs
          mountPath: /app/logs
        resources:
          limits:
            cpu: "1"
            memory: "2Gi"
          requests:
            cpu: "0.5"
            memory: "1Gi"
      volumes:
      - name: logs
        persistentVolumeClaim:
          claimName: logs-pvc